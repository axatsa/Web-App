server {
    listen 80;
    server_name canteen.thompson.uz;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Статика (фронтенд)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API Роутер - Перенаправляем все запросы к API во внутренний контейнер
    location /api/ {
        # Перенаправляем на сервис 'api' по внутреннему имени Docker-сети
        proxy_pass http://api:8000/; 
        proxy_set_header Host canteen.thompson.uz;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
