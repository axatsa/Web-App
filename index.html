<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thompson Optimizer</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>

<body>
  <script>
    window.addEventListener('error', function(e) {
      document.body.innerHTML = '<div style="color: red; padding: 20px; font-family: sans-serif; background: white; zIndex: 9999; position: fixed; top: 0; left: 0; right: 0; bottom: 0;"><h1>Критическая ошибка JS!</h1><p>' + e.message + '</p><pre style="white-space: pre-wrap;">' + (e.error ? e.error.stack : '') + '</pre></div>';
    });
    window.addEventListener('unhandledrejection', function(e) {
      document.body.innerHTML = '<div style="color: red; padding: 20px; font-family: sans-serif; background: white; zIndex: 9999; position: fixed; top: 0; left: 0; right: 0; bottom: 0;"><h1>Ошибка сети (Promise)!</h1><p>' + (e.reason ? e.reason.toString() : 'Unknown Error') + '</p><pre style="white-space: pre-wrap;">' + (e.reason && e.reason.stack ? e.reason.stack : '') + '</pre></div>';
    });
  </script>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

</body>

</html>
